name: Refresh Turkey subscription prices

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1,4"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Refresh Turkey catalog
        run: python scripts/refresh_subscriptions_tr.py

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/subscriptions-tr.json data/subscriptions-tr.last-known-good.json data/subscriptions-tr.changes.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh Turkey subscription prices"
            git push
          fi
